name: BIST Temel Veri Çekme

on:

  workflow_dispatch: 

permissions:
  contents: write

jobs:
  guncelle:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: pip install -r requirements.txt

      - name: Playwright Chromium kur
        run: playwright install chromium --with-deps

      - name: Veriyi güncelle
        run: python vericek.py

      - name: Dosyaları repoya kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tum_veriler.xlsx veriler.json || true
          git diff --staged --quiet || git commit -m "Guncellendi: $(date +'%d.%m.%Y %H:%M')"
          git push