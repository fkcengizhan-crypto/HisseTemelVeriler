name: BIST Temel Veri Çekme

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Repo kodlarını getir
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Chrome ve ChromeDriver Kur
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable
        install-chromedriver: true

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install selenium beautifulsoup4 openpyxl webdriver-manager

    - name: Scraper Kodunu Çalıştır
      run: python vericek.py

    - name: Excel Dosyasını Kontrol Et
      run: ls -la IsYatirim_Guncel.xlsx || echo "Excel dosyası bulunamadı!"

    - name: Excel Dosyasını Kaydet
      uses: actions/upload-artifact@v4
      with:
        name: is-yatirim-verileri
        path: IsYatirim_Guncel.xlsx
        if-no-files-found: error
